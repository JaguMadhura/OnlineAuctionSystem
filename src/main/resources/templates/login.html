<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | BidMaster</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl w-96 border-t-4 border-blue-600">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Auction Login</h2>
        
        <!-- Error Message -->
        <p th:if="${error}" class="text-red-500 text-sm mb-4 text-center font-bold" th:text="${error}"></p>

        <form action="/login" method="post">
            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">Username</label>
                <input type="text" name="username" class="w-full border p-2 rounded" placeholder="admin" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 font-bold mb-2">Password</label>
                <input type="password" name="password" class="w-full border p-2 rounded" placeholder="admin123" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Login</button>
        </form>
        <p class="mt-4 text-center text-xs text-gray-400">Hint: admin / admin123</p>
    </div>
</body>
</html>
