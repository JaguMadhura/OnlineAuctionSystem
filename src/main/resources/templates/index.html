<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>BidMaster | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Navbar with Logout -->
    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">BidMaster Online</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm">Logged in as: <strong th:text="${loggedInUser}" class="text-yellow-300">Admin</strong></span>
                <a href="/logout" class="bg-red-500 hover:bg-red-700 px-3 py-1 rounded text-sm font-bold">Logout</a>
            </div>
        </div>
    </nav>

    <!-- 1. FORM TO ADD A NEW ITEM -->
    <div class="container mx-auto mt-10 p-6 bg-white shadow-md rounded-lg">
        <h2 class="text-xl font-bold mb-4 text-blue-600">Post a New Auction Item</h2>
        <form action="/add-product" method="post" class="flex gap-4">
            <input type="text" name="name" placeholder="Item Name" class="border p-2 rounded w-full" required>
            <input type="number" name="basePrice" placeholder="Starting Price ($)" class="border p-2 rounded w-full" required>
            <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded font-bold hover:bg-green-700">List Item</button>
        </form>
    </div>

    <!-- 2. THE DYNAMIC AUCTION LIST -->
    <main class="container mx-auto my-10 px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div th:each="p : ${products}" class="bg-white rounded-lg shadow-md overflow-hidden p-4 border border-gray-200">
                <h4 class="text-lg font-bold text-gray-800" th:text="${p.name}">Product Name</h4>
                <div class="mt-4 bg-blue-50 p-3 rounded">
                    <p class="text-xs text-gray-500 uppercase font-bold">Highest Bid</p>
                    <p class="text-2xl font-bold text-green-600">$<span th:text="${p.highestBid}">0.00</span></p>
                    <p class="text-sm text-blue-600">By: <span th:text="${p.highestBidder}">No bids yet</span></p>
                </div>

                <!-- BID FORM (Automatically uses logged-in name) -->
                <form th:action="@{'/bid/' + ${p.id}}" method="post" class="mt-4">
                    <input type="number" name="amount" placeholder="Enter Amount" class="w-full border p-2 rounded mb-2 text-sm" required>
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold">Place Bid</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
